name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip xz-utils \
            python3-pip python3-setuptools python3-dev \
            autoconf automake autopoint libtool libtool-bin \
            pkg-config gettext \
            zlib1g-dev libncurses-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-v3-

      - name: Cache Buildozer local
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-local-v3-

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade wheel setuptools virtualenv
          pip install buildozer==1.5.0
          pip install cython==0.29.36

      # KRITISKI SVARĪGS SOLIS: instalē cmdline-tools un izveido saites
      # uz ceļiem, ko Buildozer 1.5 sagaida (tools/bin/sdkmanager).
      # BEZ ŠĪ SOĻA Buildozer apstājas ar "sdkmanager is not installed".
      - name: Install Android cmdline-tools and create compat symlinks
        run: |
          ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$ANDROID_SDK_ROOT/cmdline-tools"

          if [ ! -d "latest" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools latest
            rm cmdline-tools.zip
          fi

          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager" "$ANDROID_SDK_ROOT/tools/bin/avdmanager"

          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/tools/bin" >> $GITHUB_PATH

          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true

      - name: Build Android APK (debug)
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: List build artifacts
        if: always()
        run: |
          echo "=== bin/ saturs ==="
          ls -la bin/ 2>/dev/null || echo "bin/ neeksistee"
          echo "=== APK faili visur ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "APK netika izveidots"
          echo "=== Pēdējās 80 rindas no build.log ==="
          tail -80 build.log 2>/dev/null || echo "build.log neeksistee"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: BookTracker-APK
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: |
            build.log
            .buildozer/android/platform/build-*/build.log
          retention-days: 7
          if-no-files-found: warn
