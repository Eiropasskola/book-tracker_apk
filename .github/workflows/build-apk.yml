name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Buildozer Action - pārbaudīta, populārākā GitHub Action APK būvei.
      # Tā izmanto Docker imadzi ar Android SDK + NDK + Buildozer jau preinstalled,
      # tāpēc nav jāuztraucas par sdkmanager ceļiem, libffi kompilāciju utt.
      - name: Build Android APK with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      # Saglabā cache nākamajām būvēm
      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-cache-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-cache-${{ runner.os }}-

      - name: List build artifacts
        if: always()
        run: |
          echo "=== bin/ saturs ==="
          ls -la bin/ 2>/dev/null || echo "bin/ neeksistee"
          echo "=== APK faili visur ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "APK netika izveidots"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: BookTracker-APK
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30
          if-no-files-found: error
